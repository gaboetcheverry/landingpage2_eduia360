<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edu IA 360° | Transformación Educativa</title>

    <!-- Clientify Tracking Begins (Moved to Head) -->
    <script async defer src="https://analyticsplusdev.clientify.net/analytics_plus/pixel/jlGqiYa4Sko2WdQA"></script>
    <!-- Clientify Tracking Ends -->
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Configuración Tailwind -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    animation: {
                        'fade-in': 'fadeIn 0.5s ease-in-out forwards',
                        'draw': 'draw 2s ease-in-out forwards',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'float': 'float 3s ease-in-out infinite',
                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        draw: { '0%': { strokeDasharray: '1000', strokeDashoffset: '1000' }, '100%': { strokeDashoffset: '0' } },
                        float: { '0%, 100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-10px)' } },
                    },
                }
            }
        }
    </script>
    
    <!-- React, ReactDOM, Babel, Lucide -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        html { scroll-behavior: smooth; }
        .glow-text { text-shadow: 0 0 20px rgba(74, 222, 128, 0.5); }
        .glow-text-gold { text-shadow: 0 0 20px rgba(234, 179, 8, 0.5); }
        canvas { pointer-events: none; }
        .perspective-1000 { perspective: 1000px; }
        /* Scrollbar personalizada */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #374151; border-radius: 2px; }
    </style>
</head>
<body class="bg-black text-gray-100 font-sans overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- COMPONENTE DE ICONOS PARA CDN ---
        const Icon = ({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                const pascalName = name.split('-').map(part => part.charAt(0).toUpperCase() + part.slice(1)).join('');
                if (iconRef.current && lucide && lucide.icons && lucide.icons[pascalName]) {
                    lucide.createIcons({ 
                        icons: { [name]: lucide.icons[pascalName] }, 
                        nameAttr: 'data-lucide', 
                        attrs: { class: className, width: size, height: size } 
                    });
                }
            }, [name, className, size]);
            return <i ref={iconRef} data-lucide={name} className={className}></i>;
        };

        // --- DATOS ---
        const NAV_LINKS = [
            { name: 'Inicio', href: '#inicio' },
            { name: 'Propuesta', href: '#objetivo' },
            { name: 'Beneficios', href: '#beneficios' },
            { name: 'Planes', href: '#planes' },
            { name: 'Portfolio 5.0', href: '#portfolio' },
            { name: 'Recursos', href: '#recursos' },
            { name: 'Herramientas', href: '#herramientas' },
            { name: 'Casos', href: '#testimonios' },
        ];

        // --- COMPONENTES AUXILIARES ---

        // Modal 1: Auditoría Ética
        const EthicalAuditModal = ({ isOpen, onClose, getWALink }) => {
            if (!isOpen) return null;
            
            const questions = [
                "¿Tu escuela tiene una política escrita y clara sobre el uso de IA?",
                "¿Se ha informado a los padres sobre qué herramientas de IA utilizan los alumnos?",
                "¿Se eliminan los datos personales de los estudiantes antes de ingresarlos a la IA?",
                "¿Los docentes han recibido capacitación específica sobre sesgos algorítmicos?",
                "¿Existe un protocolo definido para distinguir entre plagio y uso asistido por IA?",
                "¿Se evalúan los términos de privacidad de las apps de IA antes de usarlas?",
                "¿Los estudiantes han firmado o acordado un código de honor sobre IA?",
                "¿Hay siempre supervisión humana en la calificación o feedback generado por IA?",
                "¿Se discute activamente sobre alucinaciones y errores de la IA en clase?",
                "¿Existe un canal seguro para que alumnos/maestros reporten usos indebidos?"
            ];

            const [step, setStep] = useState(0); 
            const [score, setScore] = useState(0);

            const handleAnswer = (yes) => {
                if (yes) setScore(s => s + 1);
                setStep(s => s + 1);
            };

            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/90 backdrop-blur-sm p-4 animate-fade-in">
                    <div className="bg-gray-900 border border-blue-500/30 rounded-2xl w-full max-w-lg p-8 shadow-2xl relative overflow-hidden">
                        <button onClick={onClose} className="absolute top-4 right-4 text-gray-400 hover:text-white z-10"><Icon name="x"/></button>
                        <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-blue-500 to-purple-600"></div>

                        {step === 0 && (
                            <div className="text-center space-y-6 animate-fade-in">
                                <div className="w-20 h-20 bg-blue-900/30 rounded-full flex items-center justify-center mx-auto border border-blue-500/50 shadow-[0_0_20px_rgba(59,130,246,0.3)]">
                                    <Icon name="shield" size={40} className="text-blue-400"/>
                                </div>
                                <h3 className="text-2xl font-bold text-white">Auditoría de Ética IA</h3>
                                <p className="text-gray-300">Evalúa si tu institución cumple con los protocolos de seguridad y ética necesarios para el uso de IA.</p>
                                <button onClick={() => setStep(1)} className="w-full py-3 bg-blue-600 hover:bg-blue-500 text-white rounded-xl font-bold text-lg transition-all transform hover:scale-105 shadow-lg">
                                    Iniciar Auditoría
                                </button>
                            </div>
                        )}

                        {step > 0 && step <= questions.length && (
                            <div className="space-y-8 animate-fade-in">
                                <div className="flex justify-between text-xs text-blue-400 font-mono uppercase tracking-widest">
                                    <span>Pregunta {step} de {questions.length}</span>
                                    <span>Progreso: {Math.round(((step-1)/questions.length)*100)}%</span>
                                </div>
                                <div className="w-full h-1 bg-gray-800 rounded-full">
                                    <div className="h-full bg-blue-500 rounded-full transition-all duration-300" style={{width: `${((step-1)/questions.length)*100}%`}}></div>
                                </div>
                                <h4 className="text-xl font-medium text-white min-h-[80px] flex items-center justify-center text-center">{questions[step-1]}</h4>
                                <div className="grid grid-cols-2 gap-4">
                                    <button onClick={() => handleAnswer(false)} className="py-4 rounded-xl border border-gray-600 hover:border-red-500 hover:bg-red-500/10 text-gray-300 hover:text-red-400 transition-all font-bold">No</button>
                                    <button onClick={() => handleAnswer(true)} className="py-4 rounded-xl bg-blue-600 hover:bg-blue-500 text-white shadow-lg shadow-blue-900/20 transition-all font-bold">Sí</button>
                                </div>
                            </div>
                        )}

                        {step > questions.length && (
                            <div className="text-center space-y-6 animate-fade-in">
                                <div className="w-24 h-24 mx-auto relative flex items-center justify-center">
                                    <span className="absolute text-3xl font-bold text-white">{score}/10</span>
                                    <svg className="w-full h-full transform -rotate-90"><circle cx="48" cy="48" r="40" stroke="currentColor" strokeWidth="8" fill="transparent" className="text-gray-800" /><circle cx="48" cy="48" r="40" stroke="currentColor" strokeWidth="8" fill="transparent" className={`text-${score > 7 ? 'blue' : 'red'}-500`} strokeDasharray="251.2" strokeDashoffset={251.2 - (251.2 * score) / 10} /></svg>
                                </div>
                                <h3 className="text-2xl font-bold text-white">Resultado de Auditoría</h3>
                                <div className="bg-gray-800/50 p-4 rounded-xl border border-gray-700">
                                    <a href={getWALink(`Hola, obtuve ${score}/10 en la auditoría ética. Solicito asesoría.`)} target="_blank" className="flex items-center justify-center gap-2 w-full py-3 bg-gradient-to-r from-blue-600 to-indigo-600 text-white rounded-lg font-bold shadow-lg transition-all"><Icon name="message-square" size={20}/> Solicitar Asesoría Ética</a>
                                </div>
                                <button onClick={onClose} className="w-full py-2 border border-gray-600 hover:bg-gray-800 text-white rounded-lg font-medium">Cerrar</button>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // Modal 2: Diagnóstico IA (Simplificado para integración futura)
        const DiagnosticModal = ({ isOpen, onClose }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/90 backdrop-blur-sm p-4 animate-fade-in">
                    <div className="bg-gray-900 border border-green-500/30 rounded-2xl w-full max-w-lg p-8 shadow-2xl relative">
                        <button onClick={onClose} className="absolute top-4 right-4 text-gray-400 hover:text-white"><Icon name="x"/></button>
                        <h3 className="text-2xl font-bold text-white mb-4">Próximamente: Diagnóstico IA</h3>
                        <p className="text-gray-300 mb-6">Estamos integrando el nuevo formulario de diagnóstico para tu academia. Pronto podrás calificar tu nivel de madurez tecnológica aquí mismo.</p>
                        <button onClick={onClose} className="w-full py-3 bg-green-600 text-white rounded-xl font-bold">Entendido</button>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [isAuditOpen, setIsAuditOpen] = useState(false);
            const [isDiagnosticOpen, setIsDiagnosticOpen] = useState(false);
            const getWALink = (text) => `https://wa.me/524611824875?text=${encodeURIComponent(text)}`;

            return (
                <div className="min-h-screen relative selection:bg-green-500 selection:text-white bg-black text-gray-100 font-sans">
                    
                    {/* MODALES */}
                    <EthicalAuditModal isOpen={isAuditOpen} onClose={() => setIsAuditOpen(false)} getWALink={getWALink} />
                    <DiagnosticModal isOpen={isDiagnosticOpen} onClose={() => setIsDiagnosticOpen(false)} />

                    {/* NAV */}
                    <nav className="fixed top-0 w-full z-40 border-b border-white/5 bg-black/80 backdrop-blur-md px-6 py-4 flex justify-between items-center">
                        <div className="flex items-center gap-3">
                            <span className="text-xl font-bold tracking-tighter text-white">Edu IA <span className="text-green-400">360°</span></span>
                        </div>
                        <div className="hidden md:flex gap-6 items-center">
                            {NAV_LINKS.map(l => <a key={l.name} href={l.href} className="text-sm hover:text-green-400 transition-colors">{l.name}</a>)}
                            <a href="#contacto" className="bg-green-600 px-5 py-2 rounded-full text-sm font-bold">Contacto</a>
                        </div>
                    </nav>

                    {/* HERO */}
                    <section id="inicio" className="h-screen flex flex-col items-center justify-center text-center px-4">
                        <h1 className="text-5xl md:text-7xl font-bold mb-6">IA aplicada para <br/><span className="text-green-400 glow-text">docentes y escuelas</span></h1>
                        <p className="text-xl text-gray-400 max-w-2xl mb-10">Automatiza la planeación y mejora el aprendizaje en tiempo récord.</p>
                        <div className="flex flex-wrap justify-center gap-4">
                            <button onClick={() => setIsDiagnosticOpen(true)} className="px-8 py-4 bg-green-600 rounded-xl font-bold hover:scale-105 transition-transform flex items-center gap-2"><Icon name="sparkles"/> Diagnóstico IA</button>
                            <button onClick={() => setIsAuditOpen(true)} className="px-8 py-4 border border-blue-500/50 rounded-xl font-bold hover:bg-blue-500/10 flex items-center gap-2"><Icon name="shield"/> Auditoría Ética</button>
                        </div>
                    </section>

                    {/* FOOTER */}
                    <footer id="contacto" className="py-20 bg-black border-t border-white/5 text-center text-gray-500">
                        <p>© 2025 Edu IA 360°. Transformando la educación en Querétaro.</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
