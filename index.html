    function ensureClientifyLoaded() {
      if (window.__clientify_loading || window.__clientify_loaded) return;
      window.__clientify_loading = true;
      window.__clientify_queue = window.__clientify_queue || [];

      const script = document.createElement("script");
      script.src = `https://analyticsplusdev.clientify.net/analytics_plus/pixel/${PIXEL_ID}`;
      script.async = true;

      script.onload = function () {
        window.__clientify_loaded = true;
        window.__clientify_loading = false;
        flushClientifyQueue();
        trackClientify("page_view", { page: "home", source: "eduia360_landing" });
      };

      script.onerror = function () {
        window.__clientify_loading = false;
        console.warn("No se pudo cargar el pixel de Clientify.");
      };

      document.body.appendChild(script);
    }

    function flushClientifyQueue() {
      if (typeof window._cap !== "function") return;
      const queue = window.__clientify_queue || [];
      while (queue.length) {
        const item = queue.shift();
        try {
          window._cap("event", item.name, item.payload || {});
        } catch (e) {}
      }
    }

    function trackClientify(name, payload = {}) {
      if (typeof window._cap === "function") {
        try {
          window._cap("event", name, payload);
          return;
        } catch (e) {}
      }
      window.__clientify_queue = window.__clientify_queue || [];
      window.__clientify_queue.push({ name, payload });
    }

    function QuizModal({ type, open, onClose }) {
      const quiz = QUIZZES[type];
      const [step, setStep] = useState(0);
      const [score, setScore] = useState(0);

      useEffect(() => {
        if (open) {
          setStep(0);
          setScore(0);
        }
      }, [open, type]);

      if (!open || !quiz) return null;

      const total = quiz.questions.length;
      const done = step >= total;

      const handleAnswer = (yes) => {
        if (yes) setScore((s) => s + 1);
        setStep((s) => s + 1);
      };

      const getResult = () => {
        if (type === "auditoria") {
          if (score <= 3) {
            return {
              level: "Riesgo Alto",
              color: "text-red-400",
              bar: "bg-red-500",
              text: "Necesitas protocolos urgentes de uso, privacidad y supervisión humana.",
              cta: "Quiero una auditoría ética completa",

            return {
              level: "En proceso",
              color: "text-yellow-400",
              bar: "bg-yellow-500",
              text: "Ya existen bases, pero aún falta formalizar lineamientos y criterios institucionales.",
              cta: "Quiero fortalecer mis protocolos",
            };
          }

            level: "Base sólida",
            color: "text-blue-400",
            bar: "bg-blue-500",
            text: "Tu institución muestra una base seria para una implementación responsable de IA.",
            cta: "Quiero una validación experta",
          };
        }

        if (score <= 3) {
          return {
            level: "Inicio Digital",
            color: "text-red-400",
            bar: "bg-red-500",
            text: "Conviene empezar con sensibilización, quick wins y reglas base.",
            cta: "Quiero empezar con una ruta sencilla",
          };
        }
        if (score <= 6) {
          return {
            level: "En Transición",
            color: "text-yellow-400",
            bar: "bg-yellow-500",
            text: "Tu institución tiene potencial, pero necesita estandarización, acompañamiento y visión integral.",
            cta: "Quiero una propuesta institucional",
          };
        }

          level: "Escuela Innovadora",
          color: "text-green-400",
          bar: "bg-green-500",
          text: "Ya cuentan con bases fuertes para escalar hacia liderazgo educativo con IA.",

      const result = getResult();
      const progress = total ? Math.round((step / total) * 100) : 0;

          ? "from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500"
          : "from-green-600 to-teal-600 hover:from-green-500 hover:to-teal-500";

      const accentText = quiz.accent === "blue" ? "text-blue-400" : "text-green-400";
      const accentSoft = quiz.accent === "blue" ? "bg-blue-500/10 border-blue-500/30" : "bg-green-500/10 border-green-500/30";
      const progressBar = quiz.accent === "blue" ? "bg-blue-500" : "bg-green-500";

      return (
        <div className="fixed inset-0 z-[60] bg-black/80 backdrop-blur-md flex items-center justify-center p-4">
          <div className="w-full max-w-2xl glass rounded-3xl overflow-hidden border border-white/10 shadow-2xl">
            <div className={cx("h-1 bg-gradient-to-r", buttonClass)}></div>
            <div className="p-6 md:p-8 relative">
              <button
                onClick={onClose}
                className="absolute right-4 top-4 text-gray-400 hover:text-white transition"
                aria-label="Cerrar"
              >
                <Icon name="x" size={22} />
              </button>

              {!done && step === 0 && (
                <div className="text-center py-6 animate-fade-in">
                  <div className={cx("mx-auto w-20 h-20 rounded-full flex items-center justify-center border mb-6", accentSoft)}>

                  <h3 className="text-2xl md:text-3xl font-black text-white mb-4">{quiz.title}</h3>

              {!done && step > 0 && (

                    })}
                    className={cx("inline-flex items-center gap-2 px-7 py-4 rounded-xl text-white font-bold bg-gradient-to-r transition hover:scale-[1.02]", buttonClass)}

    function StatsGraph() {
      const data = [2, 4, 6, 5, 8, 12, 15, 20, 25, 28];
      const width = 320;
      const height = 110;

      const points = data
        .map((d, i) => {
          const x = (i / (data.length - 1)) * width;
          const y = height - (d / 30) * height;
          return `${x},${y}`;
        })
        .join(" ");

      return (
        <svg width="100%" height="110" viewBox={`0 0 ${width} ${height}`} className="overflow-visible">
          <defs>
            <linearGradient id="lineGradient" x1="0" y1="0" x2="320" y2="0">
              <stop offset="0%" stopColor="#4ade80" />
              <stop offset="100%" stopColor="#14b8a6" />
            </linearGradient>
            <filter id="glow">
              <feGaussianBlur stdDeviation="2.5" result="blur" />
              <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
              </feMerge>
            </filter>
          </defs>
          <polyline
            points={points}
            fill="none"
            stroke="url(#lineGradient)"
            strokeWidth="4"
            strokeLinecap="round"
            strokeLinejoin="round"
            filter="url(#glow)"
          />
          {data.map((d, i) => {
            const x = (i / (data.length - 1)) * width;
            const y = height - (d / 30) * height;
            return <circle key={i} cx={x} cy={y} r="3.5" fill="#ffffff" />;
          })}
        </svg>
      );
    }

        if (window.lucide && typeof window.lucide.createIcons === "function") {

            window.lucide.createIcons();
          } catch (e) {}
        }
      });

      const handleChange = (e) => {
        const { name, value } = e.target;
        setForm((prev) => ({ ...prev, [name]: value }));
      };

      const submitContact = (e) => {
        e.preventDefault();

        if (!form.nombre || !form.email || !form.institucion) {
          alert("Completa nombre, correo e institución.");
          return;
        }

        const payload = {
          source: "eduia360_landing",
          nombre: form.nombre,
          email: form.email,
          institucion: form.institucion,
          telefono: form.telefono,
          servicio: form.servicio,
        };

        trackClientify("lead", payload);

        const text = [
          "Hola, quiero información de Edu IA 360.",
          `Nombre: ${form.nombre}`,
          `Email: ${form.email}`,
          `Institución: ${form.institucion}`,
          `Teléfono: ${form.telefono || "No compartido"}`,
          `Servicio de interés: ${form.servicio || "No especificado"}`,
          `Mensaje: ${form.mensaje || "Sin mensaje adicional"}`,
        ].join("\n");

        setContactSuccess(true);
        window.open(getWhatsAppLink(text), "_blank");
      };

      const heroCtas = useMemo(() => ([
        {
          label: "Ver propuesta",
          href: "#planes",
          onClick: () => trackClientify("cta_click", { label: "hero_ver_propuesta" }),
          primary: true,
        },
        {
          label: "Diagnóstico IA",
          action: () => {
            trackClientify("cta_click", { label: "hero_diagnostico" });
            setQuizOpen((s) => ({ ...s, diagnostico: true }));
          },
        },
        {
          label: "Auditoría ética",
          action: () => {
            trackClientify("cta_click", { label: "hero_auditoria" });
            setQuizOpen((s) => ({ ...s, auditoria: true }));
          },
        },
      ]), []);

      return (
        <div className="min-h-screen bg-slate-950 text-gray-100 overflow-x-hidden">
          <QuizModal
            type="diagnostico"
            open={quizOpen.diagnostico}
            onClose={() => setQuizOpen((s) => ({ ...s, diagnostico: false }))}
          />
          <QuizModal
            type="auditoria"
            open={quizOpen.auditoria}
            onClose={() => setQuizOpen((s) => ({ ...s, auditoria: false }))}
          />

                className="flex items-center gap-3"
              >
                <div className="w-11 h-11 rounded-full bg-gradient-to-br from-green-400 to-blue-600 p-[1px]">
                  <div className="w-full h-full rounded-full bg-slate-950 flex items-center justify-center text-xl">
                    ✦
                  </div>
                </div>
                <div className="text-xl font-black tracking-tight text-white">
                  Edu IA <span className="text-green-400">360</span>
                </div>
              </a>

              <div className="hidden xl:flex items-center gap-2">
                {NAV_LINKS.map((link) => (
                  <a
                    key={link.name}
                    href={link.href}
                    onClick={() => trackClientify("nav_click", { section: link.name })}
                    className="px-4 py-2 rounded-full text-sm font-medium text-gray-200 hover:text-white hover:bg-white/5 transition"
                  >
                    {link.name}
                  </a>
                ))}
                <a
                  href="#contacto"
                  onClick={() => trackClientify("cta_click", { label: "nav_contacto" })}
                  className="ml-2 px-6 py-2.5 rounded-full bg-gradient-to-r from-green-600 to-teal-600 hover:from-green-500 hover:to-teal-500 text-white font-bold transition"
                >
                  Contacto
                </a>
              </div>

              <button
                onClick={() => setMobileOpen((s) => !s)}
                className="xl:hidden p-3 rounded-xl bg-white/5 border border-white/10 hover:bg-white/10 transition"
                aria-label="Abrir menú"
              >
                <Icon name={mobileOpen ? "x" : "menu"} size={22} className="text-white" />
              </button>
            </div>

            {mobileOpen && (
              <div className="xl:hidden border-t border-white/10 bg-black/90 backdrop-blur-xl">
                <div className="px-4 py-4 flex flex-col gap-2">
                  {NAV_LINKS.map((link) => (
                    <a
                      key={link.name}
                      href={link.href}
                      onClick={() => {
                        setMobileOpen(false);
                        trackClientify("nav_click", { section: link.name });
                      }}
                      className="px-4 py-3 rounded-xl text-gray-200 hover:bg-white/5"
                    >
                      {link.name}
                    </a>
                  ))}
                </div>
              </div>
            )}
          </nav>

          <section id="inicio" className="relative pt-28 md:pt-32 min-h-screen flex items-center">
            <div className="absolute inset-0 -z-10">
              <div className="absolute left-1/2 top-24 -translate-x-1/2 w-[700px] h-[700px] rounded-full bg-green-500/10 blur-3xl"></div>
              <div className="absolute right-10 top-40 w-[320px] h-[320px] rounded-full bg-blue-500/10 blur-3xl"></div>
            </div>

            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 w-full">
              <div className="grid lg:grid-cols-2 gap-14 items-center">

                  <div className="inline-flex items-center gap-2 px-4 py-2 rounded-full border border-green-500/30 bg-green-500/10 text-green-300 text-xs uppercase tracking-[0.25em] font-bold mb-6">
                    <span className="w-2 h-2 rounded-full bg-green-400 animate-pulse"></span>
                    Nueva generación educativa
                  </div>

                  <h1 className="text-4xl sm:text-5xl md:text-6xl xl:text-7xl font-black text-white leading-[1.05] mb-6">

                    <span className="text-transparent bg-clip-text bg-gradient-to-r from-green-400 to-blue-500 glow-text">

                    </span>

                  <div className="flex flex-wrap gap-4">

                            cta.primary
                              ? "bg-gradient-to-r from-green-600 to-teal-600 hover:from-green-500 hover:to-teal-500 text-white"
                              : "bg-white/5 border border-white/10 hover:bg-white/10 text-white"
                          )}
                        >
                          {cta.label}
                        </a>
                      ) : (

                          onClick={cta.action}

                        </button>
                      )
                    )}

                      "Rutas por rol e institución",

                    ].map((item) => (
                      <div key={item} className="glass rounded-2xl p-4 text-sm text-gray-300">

                      <div className="absolute top-4 right-4 w-28 h-28 bg-green-500/20 blur-3xl rounded-full"></div>
                      <div className="text-6xl mb-4 animate-float">🚀</div>
                      <h3 className="text-3xl font-black text-white mb-2">Resultados en 8 semanas</h3>
                      <p className="text-gray-400 mb-6">Ruta guiada para docentes, coordinación y dirección.</p>
                      <div className="glass rounded-2xl p-4 border border-white/10">
                        <StatsGraph />
                        <div className="flex justify-between text-xs text-gray-500 mt-2">
                          <span>Semana 1</span>
                          <span className="text-green-400">Proyección</span>
                          <span>Semana 8</span>
                        </div>
                      </div>
                      <div className="grid grid-cols-2 gap-3 mt-5">
                        <div className="rounded-xl bg-green-500/10 border border-green-500/20 p-4">
                          <div className="text-2xl font-black text-white">+ Productividad</div>
                          <div className="text-sm text-gray-400 mt-1">Planeación, rúbricas y seguimiento</div>
                        </div>
                        <div className="rounded-xl bg-blue-500/10 border border-blue-500/20 p-4">
                          <div className="text-2xl font-black text-white">+ Innovación</div>
                          <div className="text-sm text-gray-400 mt-1">Práctica visible y diferenciadora</div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </section>

          <section id="propuesta" className="py-24">
            <div className="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
              <SectionTitle
                eyebrow="Propuesta de valor"
                title="La IA como ventaja educativa real"
                desc="No se trata solo de usar herramientas; se trata de transformar práctica docente, reputación institucional y toma de decisiones."
              />

              <div className="glass rounded-3xl p-8 md:p-10 text-center">
                <p className="text-lg md:text-xl text-gray-200 leading-relaxed">
                  En <span className="font-black text-white">Edu IA 360</span> ayudamos a que tu escuela no solo adopte IA,
                  sino que la convierta en una ventaja competitiva mediante formación aplicada, gemelos pedagógicos,
                  acompañamiento a directivos y evidencias útiles para marketing, admisiones y mejora académica.
                </p>

                <div className="mt-8">
                  <a
                    href={getWhatsAppLink("Hola, me interesa convertir la IA en una ventaja competitiva para mi institución.")}
                    target="_blank"
                    rel="noreferrer"
                    onClick={() => trackClientify("whatsapp_click", { source: "propuesta" })}
                    className="inline-flex items-center gap-3 px-8 py-4 rounded-full bg-gradient-to-r from-green-600 to-teal-600 hover:from-green-500 hover:to-teal-500 text-white font-bold transition"
                  >
                    <Icon name="arrow-right" size={18} />
                    Quiero potenciar mi escuela
                  </a>
                </div>
              </div>
            </div>
          </section>

          <section id="beneficios" className="py-24 border-t border-white/10">

              <SectionTitle
                eyebrow="Beneficios"
                title="Resultados visibles para tu comunidad educativa"
                desc="Una implementación útil debe ahorrar tiempo, elevar la calidad académica y generar confianza."
              />

              <div className="grid md:grid-cols-2 xl:grid-cols-3 gap-6">
                {BENEFITS.map((item) => (
                  <div key={item.title} className="glass rounded-3xl p-7 hover:border-green-500/20 transition">
                    <div className="w-14 h-14 rounded-2xl bg-green-500/10 border border-green-500/20 flex items-center justify-center mb-5">
