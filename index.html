<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edu IA 360° | Transformación Educativa</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Configuración Tailwind -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    animation: {
                        'fade-in': 'fadeIn 0.5s ease-in-out forwards',
                        'draw': 'draw 2s ease-in-out forwards',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'float': 'float 3s ease-in-out infinite',
                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        draw: { '0%': { strokeDasharray: '1000', strokeDashoffset: '1000' }, '100%': { strokeDashoffset: '0' } },
                        float: { '0%, 100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-10px)' } },
                    },
                }
            }
        }
    </script>
    
    <!-- React, ReactDOM, Babel, Lucide -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        html { scroll-behavior: smooth; }
        .glow-text { text-shadow: 0 0 20px rgba(74, 222, 128, 0.5); }
        .glow-text-gold { text-shadow: 0 0 20px rgba(234, 179, 8, 0.5); }
        canvas { pointer-events: none; }
        .perspective-1000 { perspective: 1000px; }
        /* Scrollbar personalizada */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #374151; border-radius: 2px; }
    </style>
</head>
<body class="bg-black text-gray-100 font-sans overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- COMPONENTE DE ICONOS PARA CDN ---
        const Icon = ({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                const pascalName = name.split('-').map(part => part.charAt(0).toUpperCase() + part.slice(1)).join('');
                if (iconRef.current && lucide && lucide.icons && lucide.icons[pascalName]) {
                    lucide.createIcons({ 
                        icons: { [name]: lucide.icons[pascalName] }, 
                        nameAttr: 'data-lucide', 
                        attrs: { class: className, width: size, height: size } 
                    });
                }
            }, [name, className, size]);
            return <i ref={iconRef} data-lucide={name} className={className}></i>;
        };

        // --- DATOS ---
        const NAV_LINKS = [
            { name: 'Inicio', href: '#inicio' },
            { name: 'Propuesta', href: '#objetivo' },
            { name: 'Beneficios', href: '#beneficios' },
            { name: 'Planes', href: '#planes' },
            { name: 'Portfolio 5.0', href: '#portfolio' },
            { name: 'Recursos', href: '#recursos' },
            { name: 'Herramientas', href: '#herramientas' },
            { name: 'Casos', href: '#testimonios' },
        ];

        // --- COMPONENTES AUXILIARES ---

        // Modal 1: Auditoría Ética (CTA -> WhatsApp)
        const EthicalAuditModal = ({ isOpen, onClose, getWALink }) => {
            if (!isOpen) return null;
            
            const questions = [
                "¿Tu escuela tiene una política escrita y clara sobre el uso de IA?",
                "¿Se ha informado a los padres sobre qué herramientas de IA utilizan los alumnos?",
                "¿Se eliminan los datos personales de los estudiantes antes de ingresarlos a la IA?",
                "¿Los docentes han recibido capacitación específica sobre sesgos algorítmicos?",
                "¿Existe un protocolo definido para distinguir entre plagio y uso asistido por IA?",
                "¿Se evalúan los términos de privacidad de las apps de IA antes de usarlas?",
                "¿Los estudiantes han firmado o acordado un código de honor sobre IA?",
                "¿Hay siempre supervisión humana en la calificación o feedback generado por IA?",
                "¿Se discute activamente sobre alucinaciones y errores de la IA en clase?",
                "¿Existe un canal seguro para que alumnos/maestros reporten usos indebidos?"
            ];

            const [step, setStep] = useState(0); 
            const [score, setScore] = useState(0);

            const handleAnswer = (yes) => {
                if (yes) setScore(s => s + 1);
                setStep(s => s + 1);
            };

            const reset = () => { setStep(0); setScore(0); };

            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/90 backdrop-blur-sm p-4 animate-fade-in">
                    <div className="bg-gray-900 border border-blue-500/30 rounded-2xl w-full max-w-lg p-8 shadow-2xl relative overflow-hidden">
                        <button onClick={onClose} className="absolute top-4 right-4 text-gray-400 hover:text-white z-10"><Icon name="x"/></button>
                        <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-blue-500 to-purple-600"></div>

                        {step === 0 && (
                            <div className="text-center space-y-6 animate-fade-in">
                                <div className="w-20 h-20 bg-blue-900/30 rounded-full flex items-center justify-center mx-auto border border-blue-500/50 shadow-[0_0_20px_rgba(59,130,246,0.3)]">
                                    <Icon name="shield" size={40} className="text-blue-400"/>
                                </div>
                                <h3 className="text-2xl font-bold text-white">Auditoría de Ética IA</h3>
                                <p className="text-gray-300">Evalúa si tu institución cumple con los protocolos de seguridad y ética necesarios para el uso de Inteligencia Artificial.</p>
                                <button onClick={() => setStep(1)} className="w-full py-3 bg-blue-600 hover:bg-blue-500 text-white rounded-xl font-bold text-lg transition-all transform hover:scale-105 shadow-lg">
                                    Iniciar Auditoría
                                </button>
                            </div>
                        )}

                        {step > 0 && step <= questions.length && (
                            <div className="space-y-8 animate-fade-in">
                                <div className="flex justify-between text-xs text-blue-400 font-mono uppercase tracking-widest">
                                    <span>Pregunta {step} de {questions.length}</span>
                                    <span>Progreso: {Math.round(((step-1)/questions.length)*100)}%</span>
                                </div>
                                <div className="w-full h-1 bg-gray-800 rounded-full">
                                    <div className="h-full bg-blue-500 rounded-full transition-all duration-300" style={{width: `${((step-1)/questions.length)*100}%`}}></div>
                                </div>
                                <h4 className="text-xl font-medium text-white min-h-[80px] flex items-center justify-center text-center">{questions[step-1]}</h4>
                                <div className="grid grid-cols-2 gap-4">
                                    <button onClick={() => handleAnswer(false)} className="py-4 rounded-xl border border-gray-600 hover:border-red-500 hover:bg-red-500/10 text-gray-300 hover:text-red-400 transition-all font-bold">No</button>
                                    <button onClick={() => handleAnswer(true)} className="py-4 rounded-xl bg-blue-600 hover:bg-blue-500 text-white shadow-lg shadow-blue-900/20 transition-all font-bold">Sí</button>
                                </div>
                            </div>
                        )}

                        {step > questions.length && (
                            <div className="text-center space-y-6 animate-fade-in">
                                <div className="w-24 h-24 mx-auto relative flex items-center justify-center">
                                    <span className="absolute text-3xl font-bold text-white">{score}/10</span>
                                    <svg className="w-full h-full transform -rotate-90"><circle cx="48" cy="48" r="40" stroke="currentColor" strokeWidth="8" fill="transparent" className="text-gray-800" /><circle cx="48" cy="48" r="40" stroke="currentColor" strokeWidth="8" fill="transparent" className={`text-${score > 7 ? 'blue' : 'red'}-500`} strokeDasharray="251.2" strokeDashoffset={251.2 - (251.2 * score) / 10} /></svg>
                                </div>
                                <div>
                                    <h3 className="text-2xl font-bold text-white mb-2">Nivel de Seguridad Ética</h3>
                                    <p className="text-gray-400 text-sm px-4">{score > 8 ? "Base sólida. Certifícate." : "Se requieren protocolos urgentes."}</p>
                                </div>
                                <div className="bg-gray-800/50 p-4 rounded-xl border border-gray-700">
                                    <p className="text-sm text-gray-300 mb-3">Solicita la revisión experta de tus protocolos.</p>
                                    <a href={getWALink(`Hola, en mi auditoría ética obtuve ${score}/10. Solicito la Auditoría Completa.`)} target="_blank" className="flex items-center justify-center gap-2 w-full py-3 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white rounded-lg font-bold shadow-lg transition-all"><Icon name="message-square" size={20}/> Solicitar Auditoría Completa</a>
                                </div>
                                <button onClick={onClose} className="w-full py-2 border border-gray-600 hover:bg-gray-800 text-white rounded-lg font-medium">Cerrar</button>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // Modal 2: Diagnóstico IA (CTA -> Cursos)
        const DiagnosticModal = ({ isOpen, onClose }) => {
            if (!isOpen) return null;
            
            const questions = [
                "¿Tu colegio tiene objetivos estratégicos definidos para IA este año?",
                "¿Los docentes usan IA semanalmente para planificar clases?",
                "¿Existen proyectos de IA visibles para los padres de familia?",
                "¿La dirección usa datos o simulaciones de IA para tomar decisiones?",
                "¿Se han automatizado tareas administrativas con IA?",
                "¿Los alumnos usan IA generativa para crear contenido complejo?",
                "¿Hay presupuesto asignado para herramientas de IA?",
                "¿Se usa IA para personalizar el aprendizaje en alumnos con rezago?",
                "¿Marketing usa IA para generar contenido de redes?",
                "¿Cuentan con 'Gemelos Pedagógicos' para los docentes?"
            ];

            const [step, setStep] = useState(0); 
            const [score, setScore] = useState(0);

            const handleAnswer = (yes) => {
                if (yes) setScore(s => s + 1);
                setStep(s => s + 1);
            };

            const reset = () => { setStep(0); setScore(0); };

            // Lógica de recomendación basada en puntaje
            const getRecommendation = (finalScore) => {
                if (finalScore <= 4) {
                    return {
                        level: "Inicio Digital",
                        color: "red",
                        desc: "Tu institución está dando los primeros pasos. Es crucial construir bases sólidas y perder el miedo a la tecnología.",
                        roadmap: [
                            "1. Sensibilización: Taller básico para romper mitos.",
                            "2. Quick Wins: Implementar IA en tareas administrativas simples.",
                            "3. Política Base: Definir reglas mínimas de uso."
                        ],
                        courses: ["Fundamentos de IA para Docentes", "Productividad Administrativa con IA"]
                    };
                } else if (finalScore <= 7) {
                    return {
                        level: "En Transición",
                        color: "yellow",
                        desc: "Tienen herramientas y voluntad, pero falta una estrategia integral para escalar y medir impacto.",
                        roadmap: [
                            "1. Estandarización: Crear prompts institucionales.",
                            "2. Gemelos Pedagógicos: Personalizar asistentes por docente.",
                            "3. Integración Curricular: IA como herramienta transversal."
                        ],
                        courses: ["Taller de Gemelos Pedagógicos", "Diseño de Experiencias de Aprendizaje con IA"]
                    };
                } else {
                    return {
                        level: "Escuela Innovadora",
                        color: "green",
                        desc: "Lideran el cambio. Es momento de potenciarlo con metodología avanzada, datos y proyecciones a futuro.",
                        roadmap: [
                            "1. Gemelo Institucional: Simulación de escenarios directivos.",
                            "2. Diferenciación: Proyectos de IA visibles hacia la comunidad.",
                            "3. Mentoría: Formar líderes internos de IA."
                        ],
                        courses: ["Certificación de Líderes IA", "Consultoría de Gemelo Institucional"]
                    };
                }
            };

            const resultData = getRecommendation(score);

            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/90 backdrop-blur-sm p-4 animate-fade-in">
                    <div className="bg-gray-900 border border-green-500/30 rounded-2xl w-full max-w-2xl p-8 shadow-2xl relative overflow-hidden flex flex-col max-h-[90vh]">
                        <button onClick={onClose} className="absolute top-4 right-4 text-gray-400 hover:text-white z-10"><Icon name="x"/></button>
                        <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-green-500 to-teal-600"></div>

                        {step === 0 && (
                            <div className="text-center space-y-6 animate-fade-in my-auto">
                                <div className="w-20 h-20 bg-green-900/30 rounded-full flex items-center justify-center mx-auto border border-green-500/50 shadow-[0_0_20px_rgba(34,197,94,0.3)]">
                                    <Icon name="brain" size={40} className="text-green-400"/>
                                </div>
                                <h3 className="text-2xl font-bold text-white">Diagnóstico de Madurez IA</h3>
                                <p className="text-gray-300">Descubre tu nivel de adopción tecnológica y obtén una <strong>Hoja de Ruta (Roadmap)</strong> personalizada para tu colegio.</p>
                                <button onClick={() => setStep(1)} className="w-full py-3 bg-green-600 hover:bg-green-500 text-white rounded-xl font-bold text-lg transition-all transform hover:scale-105 shadow-lg">
                                    Iniciar Diagnóstico
                                </button>
                            </div>
                        )}

                        {step > 0 && step <= questions.length && (
                            <div className="space-y-8 animate-fade-in my-auto">
                                <div className="flex justify-between text-xs text-green-400 font-mono uppercase tracking-widest">
                                    <span>Pregunta {step} de {questions.length}</span>
                                    <span>Progreso: {Math.round(((step-1)/questions.length)*100)}%</span>
                                </div>
                                <div className="w-full h-1 bg-gray-800 rounded-full">
                                    <div className="h-full bg-green-500 rounded-full transition-all duration-300" style={{width: `${((step-1)/questions.length)*100}%`}}></div>
                                </div>
                                <h4 className="text-xl font-medium text-white min-h-[80px] flex items-center justify-center text-center">{questions[step-1]}</h4>
                                <div className="grid grid-cols-2 gap-4">
                                    <button onClick={() => handleAnswer(false)} className="py-4 rounded-xl border border-gray-600 hover:border-red-500 hover:bg-red-500/10 text-gray-300 hover:text-red-400 transition-all font-bold">No</button>
                                    <button onClick={() => handleAnswer(true)} className="py-4 rounded-xl bg-green-600 hover:bg-green-500 text-white shadow-lg shadow-green-900/20 transition-all font-bold">Sí</button>
                                </div>
                            </div>
                        )}

                        {step > questions.length && (
                            <div className="text-center space-y-6 animate-fade-in overflow-y-auto pr-2 custom-scrollbar">
                                {/* Header Result */}
                                <div className="flex items-center justify-center gap-4 mb-2">
                                    <div className="relative w-16 h-16 flex items-center justify-center">
                                        <svg className="w-full h-full transform -rotate-90"><circle cx="32" cy="32" r="28" stroke="currentColor" strokeWidth="6" fill="transparent" className="text-gray-800" /><circle cx="32" cy="32" r="28" stroke="currentColor" strokeWidth="6" fill="transparent" className={`text-${resultData.color}-500`} strokeDasharray="175.9" strokeDashoffset={175.9 - (175.9 * score) / 10} /></svg>
                                        <span className="absolute text-xl font-bold text-white">{score}/10</span>
                                    </div>
                                    <div className="text-left">
                                        <p className="text-xs text-gray-400 uppercase tracking-widest">Nivel Detectado</p>
                                        <h3 className={`text-2xl font-bold text-${resultData.color}-400`}>{resultData.level}</h3>
                                    </div>
                                </div>
                                
                                <p className="text-sm text-gray-300 border-b border-white/10 pb-4">{resultData.desc}</p>

                                {/* Roadmap Section */}
                                <div className="bg-gray-800/40 rounded-xl p-5 border border-white/5 text-left">
                                    <h4 className="flex items-center gap-2 text-green-400 font-bold mb-3 uppercase text-xs tracking-wider">
                                        <Icon name="map" size={16}/> Tu Roadmap Sugerido
                                    </h4>
                                    <ul className="space-y-3">
                                        {resultData.roadmap.map((step, i) => (
                                            <li key={i} className="flex items-start gap-3 text-sm text-gray-200">
                                                <span className="bg-green-900/50 text-green-400 w-5 h-5 rounded-full flex items-center justify-center text-xs flex-shrink-0 mt-0.5">{i+1}</span>
                                                {step}
                                            </li>
                                        ))}
                                    </ul>
                                </div>

                                {/* Courses Recommendation */}
                                <div className="bg-gradient-to-br from-green-900/20 to-teal-900/20 rounded-xl p-5 border border-green-500/20 text-left">
                                    <h4 className="flex items-center gap-2 text-teal-400 font-bold mb-3 uppercase text-xs tracking-wider">
                                        <Icon name="book-open" size={16}/> Cursos Recomendados
                                    </h4>
                                    <div className="flex flex-wrap gap-2 mb-4">
                                        {resultData.courses.map((course, i) => (
                                            <span key={i} className="px-3 py-1 bg-teal-500/10 border border-teal-500/30 text-teal-200 rounded-full text-xs font-medium">
                                                {course}
                                            </span>
                                        ))}
                                    </div>
                                    
                                    <button 
                                        onClick={() => { onClose(); window.location.href = '#testimonios'; }} 
                                        className="w-full py-3 bg-white text-green-900 rounded-lg font-bold hover:bg-gray-100 transition-colors flex items-center justify-center gap-2 shadow-lg"
                                    >
                                        <Icon name="play" size={18} fill="currentColor"/> Ver Demos y Temarios
                                    </button>
                                </div>

                                <button onClick={onClose} className="text-xs text-gray-500 hover:text-white underline">Cerrar y volver al sitio</button>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const BackToTop = () => (
            <div className="flex justify-end mt-8">
                <a href="#inicio" className="group flex items-center gap-2 text-sm text-green-400 hover:text-white transition-all opacity-70 hover:opacity-100">
                    <span className="group-hover:-translate-y-1 transition-transform duration-300"><Icon name="arrow-up" size={16} /></span> 
                    Volver al inicio
                </a>
            </div>
        );

        const QuantumBackground = () => {
            const canvasRef = useRef(null);
            useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                let animationFrameId;
                let particles = [];
                const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
                window.addEventListener('resize', resize);
                resize();
                class Particle {
                    constructor() { this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height; this.vx = (Math.random() - 0.5) * 0.5; this.vy = (Math.random() - 0.5) * 0.5; this.size = Math.random() * 2; }
                    update() { this.x += this.vx; this.y += this.vy; if (this.x < 0 || this.x > canvas.width) this.vx *= -1; if (this.y < 0 || this.y > canvas.height) this.vy *= -1; }
                    draw() { ctx.fillStyle = 'rgba(74, 222, 128, 0.5)'; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); }
                }
                for (let i = 0; i < 60; i++) particles.push(new Particle());
                const animate = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
                    gradient.addColorStop(0, '#000000'); gradient.addColorStop(1, '#022c22');
                    ctx.fillStyle = gradient; ctx.fillRect(0, 0, canvas.width, canvas.height);
                    particles.forEach((p, index) => {
                        p.update(); p.draw();
                        for (let j = index + 1; j < particles.length; j++) {
                            const p2 = particles[j];
                            const dx = p.x - p2.x; const dy = p.y - p2.y;
                            const distance = Math.sqrt(dx * dx + dy * dy);
                            if (distance < 150) { ctx.strokeStyle = `rgba(74, 222, 128, ${0.1 - distance/1500})`; ctx.lineWidth = 0.5; ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p2.x, p2.y); ctx.stroke(); }
                        }
                    });
                    animationFrameId = requestAnimationFrame(animate);
                };
                animate();
                return () => { window.removeEventListener('resize', resize); cancelAnimationFrame(animationFrameId); };
            }, []);
            return <canvas ref={canvasRef} className="fixed inset-0 w-full h-full -z-10 pointer-events-none" />;
        };

        const Vortex = ({ children, className, containerClassName, particleCount = 200 }) => {
            const canvasRef = useRef(null);
            const containerRef = useRef(null);
            useEffect(() => {
                const canvas = canvasRef.current;
                const container = containerRef.current;
                if (!canvas || !container) return;
                const ctx = canvas.getContext('2d');
                let animationFrameId;
                let particles = [];
                const resize = () => { canvas.width = container.offsetWidth; canvas.height = container.offsetHeight; };
                resize();
                window.addEventListener('resize', resize);
                const center = { x: canvas.width / 2, y: canvas.height / 2 };
                class Particle {
                    constructor() { this.reset(); }
                    reset() { this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height; this.size = Math.random() * 2 + 0.5; this.speed = Math.random() * 2 + 0.5; this.angle = Math.random() * Math.PI * 2; this.radius = Math.random() * Math.max(canvas.width, canvas.height) * 0.8; this.hue = 120 + Math.random() * 60; }
                    update() { this.angle += this.speed * 0.005; this.radius -= this.speed * 0.5; this.x = center.x + Math.cos(this.angle) * this.radius; this.y = center.y + Math.sin(this.angle) * this.radius; if (this.radius < 5) { this.reset(); this.radius = Math.max(canvas.width, canvas.height) * 0.6; } }
                    draw() { ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fillStyle = `hsla(${this.hue}, 80%, 50%, 0.6)`; ctx.fill(); }
                }
                for (let i = 0; i < particleCount; i++) particles.push(new Particle());
                const animate = () => { ctx.fillStyle = 'rgba(0, 0, 0, 0.1)'; ctx.fillRect(0, 0, canvas.width, canvas.height); center.x = canvas.width / 2; center.y = canvas.height / 2; particles.forEach(p => { p.update(); p.draw(); }); animationFrameId = requestAnimationFrame(animate); };
                animate();
                return () => { window.removeEventListener('resize', resize); cancelAnimationFrame(animationFrameId); };
            }, [particleCount]);
            return ( <div ref={containerRef} className={`relative w-full h-full overflow-hidden ${containerClassName || ''}`}> <canvas ref={canvasRef} className="absolute inset-0 w-full h-full" /> <div className={`relative z-10 ${className || ''}`}>{children}</div> </div> );
        };

        const Card3D = ({ children, className = "" }) => {
            const cardRef = useRef(null);
            const [transform, setTransform] = useState("perspective(1000px) rotateX(0deg) rotateY(0deg)");
            const handleMouseMove = (e) => { if (!cardRef.current) return; const { left, top, width, height } = cardRef.current.getBoundingClientRect(); const x = (e.clientX - left - width / 2) / 20; const y = (e.clientY - top - height / 2) / 20; setTransform(`perspective(1000px) rotateX(${-y}deg) rotateY(${x}deg) scale(1.02)`); };
            return ( <div ref={cardRef} className={`transition-transform duration-200 ease-out ${className}`} onMouseMove={handleMouseMove} onMouseLeave={() => setTransform("perspective(1000px) rotateX(0deg) rotateY(0deg) scale(1)")} style={{ transform }}> {children} </div> );
        };

        const StatsGraph = () => {
            const data = [2, 4, 6, 5, 8, 12, 15, 20, 25, 28];
            const width = 300; const height = 100;
            const points = data.map((d, i) => { const x = (i / (data.length - 1)) * width; const y = height - (d / 30) * height; return `${x},${y}`; }).join(' ');
            return (
                <div className="w-full overflow-hidden">

                    </svg>
                </div>
            );
        };

        const DemoVideo = () => {
            const driveViewLink = "https://drive.google.com/file/d/1j35kl_u2xA5WJfSWIlM1NacqqT01X4sR/view?usp=sharing";

            return (
                <div className="w-full max-w-5xl mx-auto mb-20 relative group px-4">
                    <div className="absolute -inset-1 bg-gradient-to-r from-green-500 to-teal-500 rounded-2xl blur opacity-20 group-hover:opacity-40 transition duration-1000"></div>

        const TestimonialCarousel = () => {
            const testimonials = [
                { initial: "WB", name: "Lic. Wendy Barroso", role: "Asoc. Mexicana Éxito PYME", quote: "Su curso de IA ha sido una experiencia enriquecedora. Gracias por compartir conocimientos de manera tan didáctica y accesible.", color: "bg-green-600" },
                { initial: "CG", name: "Mtra. Carol G.", role: "Educación Básica", quote: "Ahora puedo enfocarme más en la enseñanza y menos en la preparación. La IA me ayudó a crear recursos en tiempo récord.", color: "bg-blue-600" },
                { initial: "EC", name: "Doctorante Esmeralda Cofradía", role: "Profesionista", quote: "Me encanta la clase de Edu IA 360. Combina teoría, práctica y herramientas de suma utilidad para las actividades de mi profesión.", color: "bg-pink-600" },
                { initial: "AR", name: "Mtra. Anabel Rodríguez", role: "Director Académico", quote: "Incorporamos la IA en la curricula del nivel de Maestría en nuestro Centro educativo...", color: "bg-purple-600" },
                { initial: "AB", name: "Mtro. Antonio Betancourt", role: "UPN", quote: "Agradecemos su participación como facilitador del taller 'Uso ético y estratégico de la IA en la investigación' en el Foro Académico 2025.", color: "bg-orange-600" },
                { initial: "BR", name: "Mtra. Brenda Rivera", role: "Educación Básica", quote: "Recuperé 7 horas semanales y mejoré mis estrategias didácticas.", color: "bg-teal-600" },
                { initial: "CG", name: "Mtra. Claudia González", role: "EBC Querétaro", quote: "Aplicación práctica en mis clases y proyectos personales.", color: "bg-indigo-600" }
            ];
            const [currentIndex, setCurrentIndex] = useState(0);
            const [isPaused, setIsPaused] = useState(false);
            useEffect(() => {
                if (isPaused) return;
                const interval = setInterval(() => { setCurrentIndex((prev) => (prev + 1) % testimonials.length); }, 5000);
                return () => clearInterval(interval);
            }, [isPaused, testimonials.length]);
            const prevSlide = () => { setCurrentIndex((prev) => (prev === 0 ? testimonials.length - 1 : prev - 1)); };
            const nextSlide = () => { setCurrentIndex((prev) => (prev + 1) % testimonials.length); };
            return (
                <div className="relative w-full max-w-4xl mx-auto" onMouseEnter={() => setIsPaused(true)} onMouseLeave={() => setIsPaused(false)}>
                    <div className="overflow-hidden relative min-h-[250px] flex items-center justify-center">
                        {testimonials.map((t, idx) => {
                            let position = 'opacity-0 translate-x-full pointer-events-none absolute'; 
                            if (idx === currentIndex) position = 'opacity-100 translate-x-0 z-10 relative';
                            else if (idx === (currentIndex - 1 + testimonials.length) % testimonials.length) position = 'opacity-0 -translate-x-full absolute'; 
                            return (
                                <div key={idx} className={`transition-all duration-500 ease-in-out w-full md:w-3/4 lg:w-2/3 ${position}`}>
                                    <div className="bg-gray-900/60 p-8 rounded-2xl border border-gray-700 backdrop-blur-sm shadow-2xl">

                                            <p className="italic text-gray-200 text-lg mb-6">"{t.quote}"</p>
                                            <div><p className="font-bold text-white text-lg">{t.name}</p><p className="text-sm text-green-400 font-mono">{t.role}</p></div>
                                        </div>
                                    </div>
                                </div>
                            );
                        })}

                    <button onClick={prevSlide} className="absolute left-0 top-1/2 -translate-y-1/2 bg-black/50 hover:bg-green-600 text-white p-3 rounded-full border border-white/10 backdrop-blur-md transition-all z-20 hover:scale-110" aria-label="Anterior"><Icon name="chevron-left" size={24} /></button>
                    <button onClick={nextSlide} className="absolute right-0 top-1/2 -translate-y-1/2 bg-black/50 hover:bg-green-600 text-white p-3 rounded-full border border-white/10 backdrop-blur-md transition-all z-20 hover:scale-110" aria-label="Siguiente"><Icon name="chevron-right" size={24} /></button>
                    <div className="flex justify-center gap-3 mt-6">
                        {testimonials.map((_, idx) => (
                            <button key={idx} onClick={() => setCurrentIndex(idx)} className={`w-3 h-3 rounded-full transition-all duration-300 ${idx === currentIndex ? 'bg-green-500 w-8' : 'bg-gray-600 hover:bg-gray-400'}`} aria-label={`Ir al testimonio ${idx + 1}`} />
                        ))}
                    </div>
                </div>
            );
        };

        // --- APP PRINCIPAL ---
