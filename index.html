    function ensureClientifyLoaded() {
      if (window.__clientify_loaded || window.__clientify_loading) return;
      window.__clientify_loading = true;
      window.__clientify_queue = window.__clientify_queue || [];

      const script = document.createElement("script");
      script.src = `https://analyticsplusdev.clientify.net/analytics_plus/pixel/${PIXEL_ID}`;
      script.async = true;

      script.onload = function () {
        window.__clientify_loaded = true;
        window.__clientify_loading = false;
        flushClientifyQueue();
        trackClientify("page_view", { page: "home", source: "eduia360_landing" });
      };

      script.onerror = function () {
        window.__clientify_loading = false;
        console.warn("No se pudo cargar el pixel de Clientify.");
      };

      document.body.appendChild(script);
    }

    function flushClientifyQueue() {
      if (typeof window._cap !== "function") return;
      const queue = window.__clientify_queue || [];
      while (queue.length) {
        const item = queue.shift();
        try {
          window._cap("event", item.name, item.payload || {});
        } catch (e) {}
      }
    }

    function trackClientify(name, payload = {}) {
      if (typeof window._cap === "function") {
        try {
          window._cap("event", name, payload);
          return;
        } catch (e) {}
      }
      window.__clientify_queue = window.__clientify_queue || [];
      window.__clientify_queue.push({ name, payload });
    }

    function StatsGraph() {
      const data = [2, 4, 6, 5, 8, 12, 15, 20, 25, 28];
      const width = 320;
      const height = 110;

      const points = data.map((d, i) => {
        const x = (i / (data.length - 1)) * width;
        const y = height - (d / 30) * height;
        return `${x},${y}`;
      }).join(" ");

      return (
        <svg width="100%" height="110" viewBox={`0 0 ${width} ${height}`} className="overflow-visible">
          <defs>
            <linearGradient id="lineGradient" x1="0" y1="0" x2="320" y2="0">
              <stop offset="0%" stopColor="#4ade80" />
              <stop offset="100%" stopColor="#0d9488" />
            </linearGradient>
            <filter id="glow">
              <feGaussianBlur stdDeviation="2.5" result="blur"></feGaussianBlur>
              <feMerge>
                <feMergeNode in="blur"></feMergeNode>
                <feMergeNode in="SourceGraphic"></feMergeNode>
              </feMerge>
            </filter>
          </defs>
          <polyline
            points={points}
            fill="none"
            stroke="url(#lineGradient)"
            strokeWidth="4"
            strokeLinecap="round"
            strokeLinejoin="round"
            filter="url(#glow)"
          />
          {data.map((d, i) => {
            const x = (i / (data.length - 1)) * width;
            const y = height - (d / 30) * height;
            return <circle key={i} cx={x} cy={y} r="3.5" fill="#ffffff" />;
          })}
        </svg>
      );
    }

    function QuizModal({ open, onClose, type }) {
      const isAudit = type === "audit";
      const questions = isAudit
        ? [
            "¿Tu escuela tiene una política clara sobre el uso de IA?",
            "¿Se informa a familias qué herramientas de IA se utilizan?",
            "¿Se protegen los datos personales antes de usar herramientas externas?",
            "¿Los docentes han recibido formación sobre sesgos y riesgos?",
            "¿Existe un criterio para distinguir uso asistido y plagio?",
            "¿Se revisan términos de privacidad de las apps utilizadas?",
            "¿Hay supervisión humana en retroalimentación y evaluación?",
            "¿Existe un canal para reportar usos indebidos?"
          ]
        : [
            "¿Tu colegio tiene objetivos estratégicos definidos para IA este año?",
            "¿Los docentes usan IA semanalmente para planificar clases?",
            "¿Existen proyectos visibles de IA para padres y comunidad?",
            "¿La dirección usa datos o simulaciones para tomar decisiones?",
            "¿Se han automatizado tareas administrativas con IA?",
            "¿Hay presupuesto asignado para herramientas de IA?",
            "¿Se usa IA para personalizar el aprendizaje?",
            "¿Cuentan con gemelos pedagógicos para docentes?"
          ];

      const [step, setStep] = useState(0);
      const [score, setScore] = useState(0);

      useEffect(() => {
        if (open) {
          setStep(0);
          setScore(0);
        }
      }, [open, type]);

      if (!open) return null;

      const total = questions.length;
      const finished = step >= total;

      const accentButton = isAudit
        ? "bg-blue-600 hover:bg-blue-500"
        : "bg-green-600 hover:bg-green-500";

      const accentBar = isAudit ? "bg-blue-500" : "bg-green-500";
      const accentText = isAudit ? "text-blue-400" : "text-green-400";
      const accentBorder = isAudit ? "border-blue-500/30 bg-blue-500/10" : "border-green-500/30 bg-green-500/10";

      function handleAnswer(yes) {
        if (yes) setScore((s) => s + 1);
        setStep((s) => s + 1);
      }

      function getResult() {
        if (isAudit) {
          if (score <= 3) {
            return {
              level: "Riesgo Alto",
              color: "text-red-400",
              text: "Necesitas protocolos urgentes de ética, privacidad y supervisión humana."
            };
          }
          if (score <= 6) {
            return {
              level: "En proceso",
              color: "text-yellow-400",
              text: "Ya existen bases, pero hace falta institucionalizar criterios y procedimientos."
            };
          }
          return {
            level: "Base sólida",
            color: "text-blue-400",
            text: "Tu institución muestra una base seria para una adopción responsable de IA."
          };
        }

        if (score <= 3) {
          return {
            level: "Inicio Digital",
            color: "text-red-400",
            text: "Lo ideal es empezar con quick wins, sensibilización y reglas base."
          };
        }
        if (score <= 6) {
          return {
            level: "En Transición",
            color: "text-yellow-400",
            text: "Hay voluntad y herramientas, pero hace falta estrategia integral."
          };
        }
        return {
          level: "Escuela Innovadora",
          color: "text-green-400",
          text: "Tu institución ya cuenta con bases para escalar e innovar con más fuerza."
        };
      }

      const progress = Math.round((step / total) * 100);
      const result = getResult();
      const title = isAudit ? "Auditoría Ética IA" : "Diagnóstico de Madurez IA";
      const icon = isAudit ? "shield-check" : "brain";

      return (
        <div className="fixed inset-0 z-[70] flex items-center justify-center bg-black/90 backdrop-blur-sm p-4">
          <div className="glass rounded-3xl w-full max-w-2xl shadow-2xl relative overflow-hidden">
            <div className={cx("h-1", accentBar)}></div>
            <button
              onClick={onClose}
              className="absolute top-4 right-4 text-gray-400 hover:text-white z-10"
              aria-label="Cerrar"
            >
              <Icon name="x" size={22} />
            </button>

            <div className="p-8">
              {!finished && step === 0 && (
                <div className="text-center space-y-6 animate-fade-in">
                  <div className={cx("w-20 h-20 rounded-full flex items-center justify-center mx-auto border", accentBorder)}>
                    <Icon name={icon} size={36} className={accentText} />
                  </div>
                  <h3 className="text-2xl md:text-3xl font-black text-white">{title}</h3>
                  <p className="text-gray-300">
                    {isAudit
                      ? "Evalúa si tu institución cuenta con bases mínimas de uso ético y seguro."
                      : "Descubre tu nivel de adopción tecnológica y obtén una ruta sugerida."}
                  </p>
                  <button
                    onClick={() => setStep(1)}
                    className={cx("px-8 py-4 rounded-xl font-bold text-white transition", accentButton)}
                  >
                    Iniciar
                  </button>
                </div>
              )}

              {!finished && step > 0 && (
                <div className="space-y-8 animate-fade-in">
                  <div className="flex justify-between text-xs uppercase tracking-[0.25em] text-gray-400">
                    <span>Pregunta {step} de {total}</span>
                    <span>{progress}%</span>
                  </div>

                  <div className="w-full h-2 bg-gray-800 rounded-full overflow-hidden">
                    <div className={cx("h-full rounded-full transition-all duration-300", accentBar)} style={{ width: `${progress}%` }}></div>
                  </div>

                  <h4 className="text-xl md:text-2xl font-medium text-white min-h-[100px] flex items-center justify-center text-center">
                    {questions[step - 1]}
                  </h4>

                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <button
                      onClick={() => handleAnswer(false)}
                      className="py-4 rounded-xl border border-gray-600 hover:border-red-500 hover:bg-red-500/10 text-gray-200 transition font-bold"
                    >
                      No
                    </button>
                    <button
                      onClick={() => handleAnswer(true)}
                      className={cx("py-4 rounded-xl text-white transition font-bold", accentButton)}
                    >
                      Sí
                    </button>
                  </div>
                </div>
              )}

              {finished && (
                <div className="text-center space-y-6 animate-fade-in">
                  <div className="w-24 h-24 mx-auto rounded-full border border-white/10 bg-gray-900 flex items-center justify-center text-3xl font-black text-white">
                    {score}/{total}
                  </div>
                  <div className={cx("text-3xl font-black", result.color)}>{result.level}</div>
                  <p className="text-gray-300 max-w-xl mx-auto">{result.text}</p>

                  <a
                    href={wa(`Hola, completé el ${title} y deseo seguimiento. Resultado: ${result.level}.`)}
                    target="_blank"
                    rel="noreferrer"
                    onClick={() => trackClientify("quiz_whatsapp_click", {
                      quiz: title,
                      score,
                      result: result.level
                    })}
                    className={cx("inline-flex items-center gap-2 px-8 py-4 rounded-xl text-white font-bold transition", accentButton)}
                  >
                    <Icon name="message-circle" size={18} />
                    Solicitar seguimiento
                  </a>

                  <div>
                    <button onClick={onClose} className="text-gray-500 hover:text-white underline">
                      Cerrar
                    </button>
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [mobileOpen, setMobileOpen] = useState(false);
      const [diagnosticOpen, setDiagnosticOpen] = useState(false);
      const [auditOpen, setAuditOpen] = useState(false);
      const [success, setSuccess] = useState(false);
      const [form, setForm] = useState({
        nombre: "",
        email: "",
        institucion: "",
        telefono: "",
        servicio: "",
        mensaje: ""
      });

      useEffect(() => {
        ensureClientifyLoaded();
      }, []);

      useEffect(() => {
        if (window.lucide && typeof window.lucide.createIcons === "function") {
          try {
            window.lucide.createIcons();
          } catch (e) {}
        }
      });

      function onChange(e) {
        setForm({ ...form, [e.target.name]: e.target.value });
      }

      function onSubmit(e) {
        e.preventDefault();

        if (!form.nombre || !form.email || !form.institucion) {
          alert("Completa nombre, correo e institución.");
          return;
        }

        trackClientify("lead", {
          source: "eduia360_landing",
          nombre: form.nombre,
          email: form.email,
          institucion: form.institucion,
          telefono: form.telefono,
          servicio: form.servicio
        });

        const message = [
          "Hola, quiero información de Edu IA 360.",
          `Nombre: ${form.nombre}`,
          `Correo: ${form.email}`,
          `Institución: ${form.institucion}`,
          `Teléfono: ${form.telefono || "No compartido"}`,
          `Servicio: ${form.servicio || "No especificado"}`,
          `Mensaje: ${form.mensaje || "Sin mensaje adicional"}`
        ].join("\n");

        setSuccess(true);
        window.open(wa(message), "_blank");
      }

      function colorStyles(color) {
        if (color === "yellow") {
          return {
            soft: "bg-yellow-500/10 border-yellow-500/25",
            text: "text-yellow-400",
            btn: "bg-yellow-600 hover:bg-yellow-500"
          };
        }
        if (color === "blue") {
          return {
            soft: "bg-blue-500/10 border-blue-500/25",
            text: "text-blue-400",
            btn: "bg-blue-600 hover:bg-blue-500"
          };
        }
        if (color === "pink") {
          return {
            soft: "bg-pink-500/10 border-pink-500/25",
            text: "text-pink-400",
            btn: "bg-pink-600 hover:bg-pink-500"
          };
        }
        return {
          soft: "bg-green-500/10 border-green-500/25",
          text: "text-green-400",
          btn: "bg-green-600 hover:bg-green-500"
        };
      }

      return (
        <div className="min-h-screen relative selection:bg-green-500 selection:text-white bg-black text-gray-100 font-sans overflow-x-hidden">
          <div className="fixed inset-0 -z-10 grid-bg opacity-40"></div>

          <QuizModal open={diagnosticOpen} onClose={() => setDiagnosticOpen(false)} type="diagnostic" />
          <QuizModal open={auditOpen} onClose={() => setAuditOpen(false)} type="audit" />

          <div className="hidden text-green-400 text-blue-400 text-yellow-400 text-pink-400 bg-green-600 bg-blue-600 bg-yellow-600 bg-pink-600 border-green-500 border-blue-500 border-yellow-500 border-pink-500"></div>

          <nav className="fixed top-0 w-full z-50 border-b border-white/10 bg-black/80 backdrop-blur-md">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-20 flex items-center justify-between">
              <a
                href="#inicio"
                onClick={() => trackClientify("nav_click", { section: "inicio" })}
                className="flex items-center gap-3"
              >
                <div className="relative w-10 h-10">
                  <div className="absolute inset-0 bg-gradient-to-br from-green-400 to-teal-600 rounded-full opacity-80 blur-[2px] animate-pulse"></div>
                  <div className="absolute inset-1 bg-black rounded-full flex items-center justify-center text-lg">✦</div>
                </div>
                <span className="text-xl font-black tracking-tight text-white">
                  Edu IA <span className="text-green-400">360</span>
                </span>
              </a>

              <div className="hidden xl:flex items-center gap-2">
                {NAV_LINKS.map((link) => (
                  <a
                    key={link.name}
                    href={link.href}
                    onClick={() => trackClientify("nav_click", { section: link.name })}
                    className="text-sm font-medium text-gray-200 hover:text-white hover:bg-green-500/10 px-4 py-2 rounded-full transition"
                  >
                    {link.name}
                  </a>
                ))}
                <a
                  href="#contacto"
                  onClick={() => trackClientify("cta_click", { label: "nav_contacto" })}
                  className="bg-gradient-to-r from-green-600 to-teal-600 hover:from-green-500 hover:to-teal-500 text-white border border-green-500/30 px-6 py-2 rounded-full text-sm font-bold transition ml-2"
                >
                  Contacto
                </a>
              </div>

              <button
                onClick={() => setMobileOpen(!mobileOpen)}
                className="xl:hidden text-white p-2.5 rounded-lg bg-gradient-to-r from-green-600 to-teal-600 border border-green-400/30 transition"
                aria-label="Abrir menú"
              >
                <Icon name={mobileOpen ? "x" : "menu"} size={26} />
              </button>
            </div>

            {mobileOpen && (
              <div className="xl:hidden absolute top-20 right-0 w-full sm:w-80 bg-black/95 border-l border-b border-green-500/30 h-[calc(100vh-5rem)] flex flex-col p-6 space-y-4">
                {NAV_LINKS.map((link) => (
                  <a
                    key={link.name}
                    href={link.href}
                    onClick={() => {
                      setMobileOpen(false);
                      trackClientify("nav_click", { section: link.name });
                    }}
                    className="block px-4 py-3 rounded-xl text-lg font-medium text-gray-200 hover:bg-green-500/10"
                  >
                    {link.name}
                  </a>
                ))}
              </div>
            )}
          </nav>

          <section id="inicio" className="relative min-h-screen overflow-hidden pt-24 pb-12 lg:py-0 flex items-center">
            <div className="absolute inset-0 -z-10">
              <div className="absolute left-1/2 top-24 -translate-x-1/2 w-[700px] h-[700px] rounded-full bg-green-500/10 blur-3xl"></div>
              <div className="absolute right-10 top-40 w-[260px] h-[260px] rounded-full bg-teal-500/10 blur-3xl"></div>
            </div>

            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 w-full">
              <div className="grid lg:grid-cols-2 gap-16 items-center w-full">
                <div className="space-y-8 animate-fade-in">
                  <div className="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-green-900/60 border border-green-500/50 text-green-300 text-xs font-mono uppercase tracking-[0.25em]">
                    <span className="w-2 h-2 rounded-full bg-green-500 animate-ping"></span>
                    Nueva generación educativa
                  </div>

                  <h1 className="text-5xl md:text-6xl font-black leading-tight text-white">
                    IA integral aplicada para <br />
                    <span className="text-transparent bg-clip-text bg-gradient-to-r from-green-400 to-blue-500 glow-text">
                      docentes y escuelas
                    </span>
                  </h1>

                  <p className="text-xl text-gray-200 max-w-lg leading-relaxed border-l-4 border-green-500 pl-6">
                    Más tiempo, clases más activas y evidencias de aprendizaje en 8 semanas.
                  </p>

                  <div className="flex flex-wrap gap-4 pt-2">
                    <a
                      href="#planes"
                      onClick={() => trackClientify("cta_click", { label: "hero_ver_propuesta" })}
                      className="px-8 py-4 bg-gradient-to-r from-green-600 to-teal-600 text-white rounded-lg font-semibold hover:scale-[1.02] transition flex gap-2 items-center"
                    >
                      Ver Propuesta
                      <Icon name="chevron-right" size={18} />
                    </a>

                    <button
                      onClick={() => {
                        setDiagnosticOpen(true);
                        trackClientify("cta_click", { label: "hero_diagnostico" });
                      }}
                      className="px-8 py-4 bg-black/40 border border-green-500/50 text-white rounded-lg font-semibold flex gap-2 items-center hover:bg-green-500/10 transition"
                    >
                      <Icon name="sparkles" size={18} />
                      Diagnóstico IA
                    </button>

                    <button
                      onClick={() => {
                        setAuditOpen(true);
                        trackClientify("cta_click", { label: "hero_auditoria" });
                      }}
                      className="px-8 py-4 bg-black/40 border border-blue-500/50 text-white rounded-lg font-semibold flex gap-2 items-center hover:bg-blue-500/10 transition"
                    >
                      <Icon name="shield" size={18} />
                      Auditoría ética
                    </button>
                  </div>
                </div>

                <div className="hidden lg:block h-[500px]">
                  <div className="w-full h-full glass rounded-2xl border border-white/10 flex flex-col items-center justify-center p-10 relative overflow-hidden">
                    <div className="w-40 h-40 bg-green-500 rounded-full blur-[80px] absolute opacity-20 animate-pulse-slow"></div>
                    <div className="relative z-10 text-6xl mb-4 animate-float">🚀</div>
                    <h2 className="relative z-10 text-3xl font-black text-white">Resultados en 8 Semanas</h2>
                    <p className="relative z-10 text-gray-300 mb-8">Ahorro de 6-8 horas por semana</p>
                    <div className="w-full mt-4 relative z-10 bg-black/50 p-4 rounded-xl border border-white/10">
                      <StatsGraph />
                      <div className="flex justify-between text-xs text-gray-400 mt-2">
                        <span>Semana 1</span>
                        <span className="text-green-400">Proyección</span>
                        <span>Semana 8</span>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </section>

          <section id="objetivo" className="py-24 bg-gradient-to-b from-black to-gray-900/50">
            <div className="max-w-4xl mx-auto px-4 text-center">
              <SectionTitle
                eyebrow="Propuesta de valor"
                title="La IA como ventaja competitiva real"
                desc="No se trata solo de usar herramientas, sino de transformar práctica docente, posicionamiento institucional y toma de decisiones."
              />

              <div className="glass p-8 rounded-2xl border border-green-500/20 shadow-2xl">
                <p className="text-lg md:text-xl text-gray-200 leading-relaxed mb-8">
                  En <span className="font-black text-white">Edu IA 360</span> ayudamos a que tu colegio no solo use IA,
                  sino que la convierta en una ventaja competitiva real. Implementamos proyectos de IA en el aula que se
                  transforman en historias, evidencias y resultados visibles, mientras cada docente trabaja con su
                  <span className="font
